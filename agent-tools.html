<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>業務專屬連結產生器｜齊家不動產</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --blue:#1C3D65; --blue-d:#00355E; --navy:#062345; --blue-m:#325B8E; --blue-l:#7DA3CA; --grey:#DCDDDD; --grey-l:#F7F8F8; --grey-t:#7B8388; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Franklin Gothic Medium","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; color:var(--navy);
        background:var(--grey-l); min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:26px 16px 60px; }
  .card{ background:#fff; width:min(460px,100%); border-radius:16px; box-shadow:0 12px 40px rgba(28,61,101,.14); border:1px solid var(--grey); overflow:hidden; }
  .top{ background:linear-gradient(90deg,var(--blue-d),var(--blue)); padding:20px 22px; border-bottom:3px solid var(--blue-l); display:flex; align-items:center; gap:12px; }
  .top img{ height:46px; width:auto; background:#fff; border-radius:9px; padding:4px 8px; box-shadow:0 1px 4px rgba(0,0,0,.2); }
  .top h1{ margin:0; color:#fff; font-size:17px; font-weight:800; line-height:1.3; }
  .top h1 small{ display:block; font-size:11.5px; font-weight:500; color:var(--blue-l); letter-spacing:1px; margin-top:2px; }
  .body{ padding:20px 22px 22px; }
  .note{ font-size:13px; color:var(--grey-t); line-height:1.7; background:var(--grey-l); border:1px solid var(--grey); border-radius:10px; padding:11px 13px; margin-bottom:18px; }
  .note b{ color:var(--blue); }
  label{ display:block; font-size:13.5px; font-weight:700; color:var(--navy); margin-bottom:13px; }
  label input{ display:block; width:100%; margin-top:5px; border:1px solid var(--grey); border-radius:9px; padding:11px 12px; font-size:15px; outline:none; font-family:inherit; }
  label input:focus{ border-color:var(--blue); }
  .hint{ font-weight:500; color:var(--grey-t); font-size:11.5px; margin-top:3px; }
  .gen{ width:100%; border:0; background:var(--blue); color:#fff; font-weight:800; font-size:15px; padding:13px; border-radius:10px; cursor:pointer; margin-top:4px; font-family:inherit; }
  .gen:hover{ background:var(--blue-d); }
  #out{ display:none; margin-top:20px; padding-top:18px; border-top:1px dashed var(--grey); }
  #out.show{ display:block; }
  #out .olbl{ font-size:13px; font-weight:800; color:var(--blue); margin-bottom:8px; }
  .urlrow{ display:flex; align-items:center; gap:8px; background:var(--grey-l); border:1px solid var(--grey); border-radius:9px; padding:10px 12px; }
  .urlrow a{ flex:1; color:var(--blue); font-weight:700; font-size:12.5px; word-break:break-all; text-decoration:underline; }
  .urlrow button{ flex:none; border:1px solid var(--blue-l); background:#fff; color:var(--blue); font-weight:800; font-size:12.5px; border-radius:7px; padding:7px 12px; cursor:pointer; font-family:inherit; }
  .acts{ display:flex; gap:9px; margin-top:11px; }
  .acts a,.acts button{ flex:1; text-align:center; border:0; border-radius:9px; padding:12px; font-weight:800; font-size:14px; cursor:pointer; text-decoration:none; font-family:inherit; }
  #copy2{ background:var(--blue); color:#fff; }
  .prev{ background:var(--grey-l); color:var(--blue); border:1px solid var(--grey)!important; }
  #qrbox{ margin-top:16px; text-align:center; display:none; }
  #qrbox.show{ display:block; }
  #qrbox .qlbl{ font-size:12.5px; font-weight:800; color:var(--blue); margin-bottom:8px; }
  #qr{ display:inline-block; background:#fff; padding:10px; border:1px solid var(--grey); border-radius:10px; }
  #qr img,#qr canvas{ display:block; }
  #qrdl{ display:inline-block; margin-top:9px; font-size:12.5px; font-weight:800; color:var(--blue); text-decoration:underline; cursor:pointer; }
  .foot{ font-size:11.5px; color:var(--grey-t); line-height:1.6; margin-top:16px; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <img src="logo-color.png" alt="齊家不動產">
    <h1>業務專屬連結產生器<small>齊家不動產 × 台南學區地圖</small></h1>
  </div>
  <div class="body">
    <div class="note">輸入你的<b>姓名</b> → 產生你的專屬網址 → 傳給客戶。客戶打開後，地圖查詢泡泡與上方的<b>姓名／電話／LINE</b>都會是你的（齊家品牌、學區資料不變）。<br>此頁僅供業務使用，<b>請勿把此頁網址給客戶</b>——只傳「產生出來的連結」或 QR Code。</div>
    <label>業務姓名<input id="code" maxlength="24" placeholder="例：王大頭" autocomplete="off">
      <span class="hint">名字打不出來或尚未開通？聯絡店長登記（姓名、電話、LINE）。</span></label>
    <div id="who" style="display:none;margin:-4px 0 13px;background:var(--grey-l);border:1px solid var(--grey);border-radius:9px;padding:9px 12px;font-size:13px;line-height:1.7"></div>
    <div id="err" style="display:none;margin:-4px 0 13px;color:#a33c2e;font-size:13px;font-weight:700"></div>
    <button class="gen" onclick="gen()">產生我的專屬連結</button>
    <div id="out">
      <div class="olbl">✅ 你的專屬分享連結（傳這個給客戶）</div>
      <div class="urlrow"><a id="ulink" href="#" target="_blank" rel="noopener"></a><button onclick="copyUrl(this)">複製</button></div>
      <div class="acts">
        <button id="copy2" onclick="copyUrl(this)">複製連結</button>
        <a class="prev" id="prev" target="_blank" rel="noopener">預覽</a>
      </div>
      <div id="qrbox">
        <div class="qlbl">📱 QR Code（給客戶掃，或存下來印在名片／DM）</div>
        <div id="qr"></div>
        <a id="qrdl" download="學區地圖QR.png">下載 QR 圖檔</a>
      </div>
    </div>
    <div class="foot">產生的連結可直接貼 LINE／FB 傳給客戶。同一位業務固定用自己的連結即可，資料不會過期。</div>
  </div>
</div>
<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
function esc(s){ return String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
let ROSTER=null;
async function roster(){ if(!ROSTER){ ROSTER=await fetch('agents.json?t='+Date.now()).then(r=>r.json()); } return ROSTER; }
async function gen(){
  const input=document.getElementById('code').value.trim();
  const who=document.getElementById('who'), err=document.getElementById('err');
  who.style.display='none'; err.style.display='none';
  document.getElementById('out').classList.remove('show');
  if(!input){ document.getElementById('code').focus(); return; }
  let j={};
  try{ j=await roster(); }catch(_){ err.textContent='名冊載入失敗，請稍後再試'; err.style.display='block'; return; }
  const low=input.toLowerCase();
  let code=null, rec=null;
  for(const k in j){ if(k.toLowerCase()===low || (j[k].name && j[k].name===input)){ code=k; rec=j[k]; break; } }
  if(!rec){ err.textContent='「'+input+'」尚未登記，請聯絡店長開通。'; err.style.display='block'; return; }
  who.innerHTML='✅ 已登記：<b>'+esc(rec.name)+'</b>　'+esc(rec.tel||'')+(rec.line?'　<span style="color:#06934a;font-weight:700">LINE ✓</span>':'　（用齊家公用 LINE）');
  who.style.display='block';
  const u=new URL(location.origin+'/');
  u.searchParams.set('a',code);
  const url=u.toString();
  const a=document.getElementById('ulink'); a.textContent=url; a.href=url;
  document.getElementById('prev').href=url;
  document.getElementById('out').classList.add('show');
  if(typeof QRCode!=='undefined'){
    document.getElementById('qr').innerHTML='';
    new QRCode(document.getElementById('qr'),{ text:url, width:180, height:180, colorDark:'#062345', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });
    document.getElementById('qrbox').classList.add('show');
    setTimeout(()=>{ const c=document.querySelector('#qr canvas'); const img=document.querySelector('#qr img'); const d=document.getElementById('qrdl'); if(c) d.href=c.toDataURL('image/png'); else if(img) d.href=img.src; },300);
  }
}
function copyUrl(btn){
  const v=document.getElementById('ulink').textContent;
  if(!v) return;
  try{ navigator.clipboard.writeText(v); }catch(_){ const i=document.createElement('input'); document.body.appendChild(i); i.value=v; i.select(); document.execCommand('copy'); i.remove(); }
  const t=btn.textContent; btn.textContent='已複製 ✓'; setTimeout(()=>btn.textContent=t,1500);
}
document.querySelectorAll('input').forEach(i=>i.addEventListener('keydown',e=>{ if(e.key==='Enter') gen(); }));
</script>
</body>
</html>
